services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ashantihub
      POSTGRES_USER: ashantihub
      POSTGRES_PASSWORD: ashantihub_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  web:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
volumes:
  pgdata:
